<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin Studio Crayon</title>

<style>
body { font-family: Arial; background:#111; color:#fff; padding:20px; }
.card { background:#222; padding:15px; margin-bottom:10px; border-radius:10px; }
.small { color:#aaa; font-size:12px; }

.image-box {
  margin-top:10px;
  padding:10px;
  background:#1a1a1a;
  border-radius:8px;
}

.image-box a {
  color:#4da3ff;
  text-decoration:none;
  display:block;
  margin-top:5px;
}

.image-name {
  font-size:12px;
  color:#bbb;
}
</style>

</head>
<body>

<h1>📦 Commandes Studio Crayon</h1>
<div id="orders">Chargement...</div>

<script>
async function loadOrders() {
  const res = await fetch("https://studio-crayon-api.jenagreen98.workers.dev/orders");
  const data = await res.json();

  const container = document.getElementById("orders");
  container.innerHTML = "";

  data.orders.forEach(o => {
    const div = document.createElement("div");
    div.className = "card";

    const images = (o.images || []).map(img => {
      const fileName = img.split("/").pop();

      return `
        <div class="image-box">
          <div class="image-name">📁 ${fileName}</div>
          <a href="${img}" target="_blank">👁 Ouvrir / télécharger l’image</a>
        </div>
      `;
    }).join("");

    div.innerHTML = `
      <b>Order :</b> ${o.orderId}<br>
      <b>Type :</b> ${o.type} | ${o.format} | ${o.subjects} sujets<br>
      <b>Client :</b> ${o.customer?.name || "N/A"}<br>
      <b>Email :</b> ${o.customer?.email || "N/A"}<br>
      <b>Payé :</b> ${o.paid ? "✅ oui" : "❌ non"}<br>
      <div class="small">${o.createdAt}</div>

      ${images}
    `;

    container.appendChild(div);
  });
}

loadOrders();
</script>

</body>
</html>
