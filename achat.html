<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commander un portrait | Studio Crayon</title>

  <link rel="stylesheet" href="styles.css" />

  <style>
    .container-page {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    h1 { text-align:center; }

    .subtitle {
      text-align:center;
      color:#555;
      margin-bottom:10px;
    }

    .warning {
      text-align:center;
      color:#c00;
      font-size:13px;
      display:none;
      margin-bottom:10px;
    }

    .choices {
      display:flex;
      justify-content:center;
      gap:20px;
      margin-top:20px;
    }

    .card {
      width:220px;
      border:2px solid #ddd;
      border-radius:12px;
      text-align:center;
      padding:10px;
      cursor:pointer;
      opacity:0.6;
      transition:0.2s;
      background:white;
    }

    .card.active {
      border-color:black;
      opacity:1;
    }

    .card img {
      width:100%;
      border-radius:8px;
    }

    .box {
      background:white;
      padding:15px;
      margin-top:20px;
      border-radius:10px;
    }

    .disabled {
      opacity:0.5;
      pointer-events:none;
    }

    select, input, textarea {
      width:100%;
      padding:10px;
      margin-top:10px;
      box-sizing:border-box;
    }

    .price {
      font-size:22px;
      font-weight:bold;
      margin-top:10px;
    }

    small {
      display:block;
      text-align:center;
      margin-top:5px;
      color:#666;
    }

    button {
      width:100%;
      padding:15px;
      font-size:18px;
      background:black;
      color:white;
      border:none;
      margin-top:20px;
      cursor:pointer;
    }
  </style>
</head>

<body class="home">

<header class="site-header">
  <div class="container">
    <a href="index.html" class="site-name">Portraitiste</a>
  </div>
</header>

<div class="container-page">

  <h1>Commander votre portrait</h1>
  <div class="subtitle">Choisissez votre technique</div>

  <div class="warning" id="warning">
    *Veuillez d'abord choisir Crayon ou Pastel pour continuer
  </div>

  <!-- CHOIX TECHNIQUE -->
  <div class="choices">

    <div class="card" id="crayon" onclick="selectType('crayon')">
      <img src="crayon3.png" alt="Crayon gris">
      <h3>Crayon gris</h3>
    </div>

    <div class="card" id="pastel" onclick="selectType('pastel')">
      <img src="pastel5.png" alt="Pastel couleur">
      <h3>Pastel couleur</h3>
    </div>

  </div>

  <!-- OPTIONS -->
  <div class="box disabled" id="optionsBox">

    <label>Nombre de sujets sur 1 dessin</label>
    <small>(Ex : 2 personnes = 1 seule illustration)</small>

    <select id="subjects" disabled onchange="updateFormats()"></select>

    <label>Format</label>
    <select id="format" disabled onchange="calculatePrice()"></select>

    <div class="price" id="price">Prix : -- €</div>
    <div id="shipping"></div>

  </div>

  <!-- CONSEIL PHOTO -->
  <div class="box">
    💡 Envoyez des photos nettes, bien éclairées et de face si possible.
  </div>

  <!-- INFOS CLIENT -->
  <div class="box">

    <input type="text" id="name" placeholder="Nom *" required>
    <input type="text" id="firstname" placeholder="Prénom *" required>
    <input type="email" id="email" placeholder="Email *" required>

    <textarea id="message"
      placeholder="Précisions sur votre commande (optionnel)"
      rows="5"></textarea>

    <input type="file" multiple accept="image/*">

  </div>

  <button onclick="sendOrder()">
    Procéder au paiement
  </button>

</div>

<script>
let type = null;

const data = {
  crayon: {
    1: { "24x30": 50, "30x40": 65, "35x50": 85, "50x65": 120 },
    2: { "24x30": 70, "30x40": 90, "35x50": 115, "50x65": 165 },
    3: { "30x40": 115, "35x50": 145, "50x65": 210 },
    4: { "35x50": 175, "50x65": 255 },
    5: { "35x50": 205, "50x65": 300 },
    6: { "50x65": 345 }
  },

  pastel: {
    1: { "18x24": 80, "24x30": 120, "30x40": 160, "35x50": 200, "50x70": 270 },
    2: { "24x30": 160, "30x40": 210, "35x50": 260, "50x70": 340 },
    3: { "30x40": 260, "35x50": 320, "50x70": 410 },
    4: { "35x50": 380, "50x70": 480 },
    5: { "50x70": 550 },
    6: { "50x70": 620 }
  }
};

function selectType(t) {
  type = t;

  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  document.getElementById(t).classList.add('active');

  document.getElementById("warning").style.display = "none";

  let box = document.getElementById("optionsBox");
  box.classList.remove("disabled");

  let subjects = document.getElementById("subjects");
  let format = document.getElementById("format");

  subjects.disabled = false;
  format.disabled = false;

  subjects.innerHTML = "";

  for (let i = 1; i <= 6; i++) {
    subjects.innerHTML += `<option value="${i}">${i} sujet(s)</option>`;
  }

  updateFormats();
}

function updateFormats() {
  if (!type) return;

  let s = document.getElementById("subjects").value;
  let format = document.getElementById("format");

  format.innerHTML = "";

  if (!data[type][s]) return;

  for (let f in data[type][s]) {
    format.innerHTML += `<option value="${f}">${f}</option>`;
  }

  calculatePrice();
}

function calculatePrice() {
  let s = document.getElementById("subjects").value;
  let f = document.getElementById("format").value;

  if (!type || !data[type][s] || !data[type][s][f]) return;

  let price = data[type][s][f];
  document.getElementById("price").innerText = "Prix : " + price + " €";
}

/* 🔥 STRIPE CLEAN */
async function sendOrder() {

  if (!type) {
    alert("Choisis Crayon ou Pastel");
    return;
  }

  const s = document.getElementById("subjects").value;
  const f = document.getElementById("format").value;


 const order = {
  type,
  subjects: s,
  format: f,
  name: document.getElementById("name").value,
  firstname: document.getElementById("firstname").value,
  email: document.getElementById("email").value,
  message: document.getElementById("message").value
};

  try {
    const res = await fetch("https://studio-crayon-api.jenagreen98.workers.dev/create-checkout-session", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(order)
    });

    const result = await res.json();

    if (result.url) {
      window.location.href = result.url;
    } else {
      alert("Erreur paiement Stripe");
      console.log(result);
    }

  } catch (e) {
    console.error(e);
    alert("Erreur paiement ❌");
  }
}
</script>

</body>
</html>
